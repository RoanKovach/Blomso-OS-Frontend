# AWS Amplify build spec for Blomso-OS-Frontend (Vite + React SPA).
# SPA routing: Direct routes (e.g. /Dashboard, /auth/callback) must serve index.html.
# See docs/HOSTING.md. Add rewrite in Console if needed: source /<*>, target /index.html (200).
# Rule set in repo: amplify-spa-rewrite.json.
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
